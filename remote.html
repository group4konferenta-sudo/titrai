<!DOCTYPE html>
<html>
<head>
    <title>Google Sheets to OBS Controller</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; padding: 20px; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .ok { background: #2e7d32; }
        .error { background: #c62828; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #444; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>Google Sheets -> OBS Sinchronizatorius</h2>
    <div id="status" class="status">Jungiamasi...</div>
    <div id="data-preview"></div>

    <script>
        const GOOGLE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCT_6T0SLhkjL31iFSEFMESE7CDsoSMMqsjSUFglHi2KLZNuRzeAogXgkUiv_8BdtCGfMH-kuZGQec/pub?output=csv";

        async function sync() {
            try {
                const res = await fetch(GOOGLE_CSV + "&cachebust=" + new Date().getTime());
                const text = await res.text();
                const rows = text.split('\n').filter(r => r.trim() !== "");
                
                let html = "<table><tr><th>ID</th><th>Vardas</th><th>Informacija</th></tr>";
                
                rows.forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, "").trim());
                    const i = index + 1;
                    
                    // PAGRINDINIS VEIKSMAS: Įrašome į localStorage, kurį skaito tavo titrų failas (Overlay)
                    localStorage.setItem(`alt-${i}-name`, cols[0] || "");
                    localStorage.setItem(`alt-${i}-info`, cols[1] || "");
                    
                    html += `<tr><td>${i}</td><td>${cols[0] || ""}</td><td>${cols[1] || ""}</td></tr>`;
                });
                
                html += "</table>";
                document.getElementById('data-preview').innerHTML = html;
                document.getElementById('status').innerText = "Sinchronizuota: " + new Date().toLocaleTimeString();
                document.getElementById('status').className = "status ok";
                
                // Siunčiame signalą į OBS (jei reikia)
                // Čia priklauso nuo to, kaip tavo titrų failas supranta, kad reikia atsinaujinti
            } catch (e) {
                document.getElementById('status').innerText = "Klaida: " + e.message;
                document.getElementById('status').className = "status error";
            }
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
